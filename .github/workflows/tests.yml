name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
  workflow_dispatch:

jobs:
  backend-unit-tests:
    name: Backend Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements*.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r backend/requirements-test.txt

      - name: Run unit tests with coverage
        run: |
          pytest backend/tests/unit \
            --tb=short \
            --cov=backend/app \
            --cov-report=term-missing \
            --cov-report=xml:coverage-unit.xml \
            -q

      - name: Run integration tests (mocked DB)
        run: |
          pytest backend/tests/integration \
            --tb=short \
            --cov=backend/app \
            --cov-report=term-missing \
            --cov-report=xml:coverage-integration.xml \
            -q

      - name: Upload coverage reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: backend-coverage
          path: coverage-*.xml
          retention-days: 30

  frontend-tests:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-react
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend-react/package-lock.json

      - name: Install dependencies
        # npm install (not ci) so new devDeps like vitest are resolved even if
        # the lock file predates their addition on a Safety-proxy-restricted machine
        run: npm install

      - name: Run tests
        run: npm test

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: frontend-coverage
          path: frontend-react/coverage/
          retention-days: 30

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [backend-unit-tests, frontend-tests]
    if: always()
    steps:
      - name: Report test results
        run: |
          echo "# 🧪 Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend (unit + integration) | ${{ needs.backend-unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend (vitest) | ${{ needs.frontend-tests.result }} |" >> $GITHUB_STEP_SUMMARY
